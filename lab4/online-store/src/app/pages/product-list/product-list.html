<h1 class="title">Online Store</h1>

<div class="grid">
  @for (p of products; track p.id) {
    <article class="card">
      <a class="imgWrap" [href]="p.link" target="_blank" rel="noopener">
        <img [src]="p.image" [alt]="p.name" />
      </a>

      <div class="body">
        <a class="name" [href]="p.link" target="_blank" rel="noopener">{{ p.name }}</a>
        <p class="desc">{{ p.description }}</p>

        <div class="row">
          <div class="price">{{ p.price | number }} ₸</div>

          <div class="rating">
            <span class="stars">
              @for (s of stars(p.rating); track $index) {
                <span class="star" [class.filled]="s === 1">★</span>
              }
            </span>
            <span class="badge">{{ p.rating }}</span>
          </div>
        </div>

        <div class="actions">
          <button type="button" (click)="shareWhatsApp(p)">Share WhatsApp</button>
          <button type="button" (click)="shareTelegram(p)">Share Telegram</button>
        </div>
      </div>
    </article>
  }
</div>
